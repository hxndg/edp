# 基础设施：Postgres / Kafka / MinIO(+建桶 Job) / Iceberg REST Catalog。
# 与 docker-compose.yml 同一套镜像和参数，只是搬进集群。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: data
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - { name: POSTGRES_USER, value: edp }
            - { name: POSTGRES_PASSWORD, value: edp123 }
            # 主库建 dagster，init 脚本再建 platform 库并灌 DDL（与 docker-compose 相同）
            - { name: POSTGRES_DB, value: dagster }
            - { name: POSTGRES_PLATFORM_DB, value: platform }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            # postgres-init configmap 由 apply.sh 从 schemas/ 目录生成，避免 SQL 双份维护
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "edp", "-d", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: edp-postgres
        - name: init
          configMap:
            name: postgres-init
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: data
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
# 单节点 KRaft Kafka（与 docker-compose 相同镜像），只暴露集群内 listener kafka:9092。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: data
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: CLUSTER_ID, value: "edp-mvp-kraft-cluster-id" }
          ports:
            - containerPort: 9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: data
spec:
  selector: { app: kafka }
  ports:
    - port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: data
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-10-13T13-34-11Z
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER, value: minioadmin }
            - { name: MINIO_ROOT_PASSWORD, value: minioadmin123 }
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: edp-minio
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: data
spec:
  selector: { app: minio }
  ports:
    - { name: api, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
# 建 bucket 的一次性 Job（等价 compose 的 minio-init）
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: data
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 minioadmin minioadmin123; do sleep 2; done
              mc mb -p local/lake
---
# OpenSearch：tag 检索投影（README 3.5）。SoT 在 Iceberg，索引可整体重建，
# 所以单节点、无副本、emptyDir 存储都可接受——挂了重跑 entity_tag_index 即可。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: data
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: opensearch }
  template:
    metadata:
      labels: { app: opensearch }
    spec:
      initContainers:
        # OpenSearch 启动要求 vm.max_map_count >= 262144（minikube 节点默认不够）
        - name: sysctl
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.19.1
          imagePullPolicy: IfNotPresent
          env:
            - { name: discovery.type, value: single-node }
            - { name: DISABLE_SECURITY_PLUGIN, value: "true" }  # MVP：集群内明文访问
            - { name: OPENSEARCH_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: data
spec:
  selector: { app: opensearch }
  ports:
    - port: 9200
      targetPort: 9200
---
# OpenSearch Dashboards：人用的检索界面（Discover + DQL 复合查询），
# 程序检索走 gateway /search/tags，两者读同一个索引。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: opensearch-dashboards }
  template:
    metadata:
      labels: { app: opensearch-dashboards }
    spec:
      containers:
        - name: dashboards
          image: opensearchproject/opensearch-dashboards:2.19.1
          imagePullPolicy: IfNotPresent
          env:
            - { name: OPENSEARCH_HOSTS, value: '["http://opensearch:9200"]' }
            - { name: DISABLE_SECURITY_DASHBOARDS_PLUGIN, value: "true" }
          ports:
            - containerPort: 5601
          readinessProbe:
            httpGet: { path: /api/status, port: 5601 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: data
spec:
  selector: { app: opensearch-dashboards }
  ports:
    - port: 5601
      targetPort: 5601
---
# MLflow（README 3.7）：实验记录 + Model Registry 的操作台，不是 SoT。
# 复用 edp:dev 镜像（mlflow 在 pyproject 依赖里）；backend 用 PG 独立的 mlflow 库，
# artifact 经 server 代理（--serve-artifacts）写 MinIO s3://lake/mlflow——
# worker 打点时不需要任何 S3 凭证。挂了只丢过程观测，训练照常（best-effort）。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: mlflow }
  template:
    metadata:
      labels: { app: mlflow }
    spec:
      initContainers:
        # 幂等建库：postgres 卷已初始化过的老部署不会重跑 init 脚本，这里补建
        - name: ensure-db
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - { name: PGPASSWORD, value: edp123 }
          command:
            - bash
            - -c
            - |
              until pg_isready -h postgres -U edp -d postgres; do sleep 2; done
              psql -h postgres -U edp -d dagster -tc "SELECT 1 FROM pg_database WHERE datname='mlflow'" | grep -q 1 \
                || psql -h postgres -U edp -d dagster -c "CREATE DATABASE mlflow OWNER edp"
      containers:
        - name: mlflow
          image: edp:dev
          imagePullPolicy: IfNotPresent
          command:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5000
            # 必须走 psycopg2（镜像里装了 psycopg2-binary）：MLflow 的 SQLAlchemy
            # 查询在 psycopg3 方言下会触发 "integer = character varying" 类型错误
            - --backend-store-uri=postgresql+psycopg2://edp:edp123@postgres:5432/mlflow
            - --artifacts-destination=s3://lake/mlflow
            - --serve-artifacts
          env:
            - { name: MLFLOW_S3_ENDPOINT_URL, value: "http://minio:9000" }
            - { name: AWS_ACCESS_KEY_ID, value: minioadmin }
            - { name: AWS_SECRET_ACCESS_KEY, value: minioadmin123 }
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: data
spec:
  selector: { app: mlflow }
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: iceberg-rest }
  template:
    metadata:
      labels: { app: iceberg-rest }
    spec:
      initContainers:
        # 幂等建库（与 mlflow 的 ensure-db 同理）：老部署的 postgres 卷不会重跑 init 脚本
        - name: ensure-db
          image: postgres:16
          imagePullPolicy: IfNotPresent
          env:
            - { name: PGPASSWORD, value: edp123 }
          command:
            - bash
            - -c
            - |
              until pg_isready -h postgres -U edp -d postgres; do sleep 2; done
              psql -h postgres -U edp -d dagster -tc "SELECT 1 FROM pg_database WHERE datname='iceberg_catalog'" | grep -q 1 \
                || psql -h postgres -U edp -d dagster -c "CREATE DATABASE iceberg_catalog OWNER edp"
      containers:
        - name: iceberg-rest
          image: tabulario/iceberg-rest:1.6.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: CATALOG_WAREHOUSE, value: "s3://lake/warehouse" }
            - { name: CATALOG_IO__IMPL, value: "org.apache.iceberg.aws.s3.S3FileIO" }
            - { name: CATALOG_S3_ENDPOINT, value: "http://minio:9000" }
            - { name: CATALOG_S3_PATH__STYLE__ACCESS, value: "true" }
            - { name: AWS_ACCESS_KEY_ID, value: minioadmin }
            - { name: AWS_SECRET_ACCESS_KEY, value: minioadmin123 }
            - { name: AWS_REGION, value: us-east-1 }
            # catalog 元数据必须持久化：镜像默认是进程内 SQLite（mode=memory），
            # pod 一重启所有表的注册信息全丢（数据文件还在 MinIO，但 catalog
            # 不再认识它们）。这里落到 postgres 的 iceberg_catalog 库。
            - { name: CATALOG_CATALOG__IMPL, value: "org.apache.iceberg.jdbc.JdbcCatalog" }
            - { name: CATALOG_URI, value: "jdbc:postgresql://postgres:5432/iceberg_catalog" }
            - { name: CATALOG_JDBC_USER, value: edp }
            - { name: CATALOG_JDBC_PASSWORD, value: edp123 }
          ports:
            - containerPort: 8181
---
apiVersion: v1
kind: Service
metadata:
  name: iceberg-rest
  namespace: data
spec:
  selector: { app: iceberg-rest }
  ports:
    - port: 8181
      targetPort: 8181
