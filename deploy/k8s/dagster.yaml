# Dagster 实例配置（挂载为 configmap `dagster-instance`，webserver / daemon /
# code-location / 每个 run pod 都读同一份）。
storage:
  postgres:
    postgres_db:
      username: edp
      password: edp123
      hostname: postgres
      db_name: dagster
      port: 5432

# DAGSTER_HOME 是只读的 configmap 挂载，本地工件（sensor tick 日志捕获、
# compute log 等临时文件）必须指到可写路径，否则 sensor 里 context.log 会报
# "Read-only file system"。这些只是缓存/日志捕获，真相在 PG，放 /tmp 即可。
local_artifact_storage:
  module: dagster.core.storage.root
  class: LocalArtifactStorage
  config:
    base_dir: /tmp/dagster-artifacts

compute_logs:
  module: dagster.core.storage.local_compute_log_manager
  class: LocalComputeLogManager
  config:
    base_dir: /tmp/dagster-compute-logs

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 4

# 方案 A 的执行面：每个 run 一个 K8s Job pod，镜像来自 code-location 的
# DAGSTER_CURRENT_IMAGE（同一个 edp:dev），环境变量注入 edp-env configmap。
run_launcher:
  module: dagster_k8s
  class: K8sRunLauncher
  config:
    service_account_name: dagster
    job_namespace: data
    instance_config_map: dagster-instance
    env_config_maps:
      - edp-env
    image_pull_policy: IfNotPresent
    load_incluster_config: true
    volumes:
      - name: lance
        persistentVolumeClaim:
          claimName: edp-lance
    volume_mounts:
      - name: lance
        mountPath: /data/lance

# tick 历史保留（run 本身的 30 天清理由 orchestration/retention.py 的 retention_job 负责）
retention:
  schedule:
    purge_after_days: 30
  sensor:
    purge_after_days:
      skipped: 7
      failure: 30
      success: 30

telemetry:
  enabled: false
