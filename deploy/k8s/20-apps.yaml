# 应用层：Dagster 三件套（code-location / webserver / daemon）+ FastAPI 网关。
# 四个 Deployment 共用同一个 edp:dev 镜像，按启动命令区分角色。
#
# code-location：跑用户代码的 gRPC server。webserver/daemon 通过它加载定义，
# sensor/schedule 的求值也在这个进程里执行（所以它要能连 PG/Kafka）。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-code
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: dagster-code }
  template:
    metadata:
      labels: { app: dagster-code }
    spec:
      serviceAccountName: dagster
      containers:
        - name: code
          image: edp:dev
          imagePullPolicy: IfNotPresent
          command: ["dagster", "api", "grpc", "-h", "0.0.0.0", "-p", "4000", "-f", "orchestration/definitions.py"]
          envFrom:
            - configMapRef: { name: edp-env }
          env:
            # K8sRunLauncher 用这个值作为 run pod 的镜像：代码和执行镜像永远一致
            - { name: DAGSTER_CURRENT_IMAGE, value: "edp:dev" }
          ports:
            - containerPort: 4000
          volumeMounts:
            - name: instance
              mountPath: /opt/dagster/dagster_home
            - name: lance
              mountPath: /data/lance
      volumes:
        - name: instance
          configMap: { name: dagster-instance }
        - name: lance
          persistentVolumeClaim: { claimName: edp-lance }
---
apiVersion: v1
kind: Service
metadata:
  name: dagster-code
  namespace: data
spec:
  selector: { app: dagster-code }
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-webserver
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: dagster-webserver }
  template:
    metadata:
      labels: { app: dagster-webserver }
    spec:
      serviceAccountName: dagster
      containers:
        - name: webserver
          image: edp:dev
          imagePullPolicy: IfNotPresent
          command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/opt/dagster/workspace/workspace.yaml"]
          envFrom:
            - configMapRef: { name: edp-env }
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: instance
              mountPath: /opt/dagster/dagster_home
            - name: workspace
              mountPath: /opt/dagster/workspace
      volumes:
        - name: instance
          configMap: { name: dagster-instance }
        - name: workspace
          configMap: { name: dagster-workspace }
---
apiVersion: v1
kind: Service
metadata:
  name: dagster-webserver
  namespace: data
spec:
  selector: { app: dagster-webserver }
  ports:
    - port: 3000
      targetPort: 3000
---
# daemon：sensor/schedule 的调度器 + QueuedRunCoordinator 的出队者。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-daemon
  namespace: data
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: dagster-daemon }
  template:
    metadata:
      labels: { app: dagster-daemon }
    spec:
      serviceAccountName: dagster
      containers:
        - name: daemon
          image: edp:dev
          imagePullPolicy: IfNotPresent
          command: ["dagster-daemon", "run", "-w", "/opt/dagster/workspace/workspace.yaml"]
          envFrom:
            - configMapRef: { name: edp-env }
          volumeMounts:
            - name: instance
              mountPath: /opt/dagster/dagster_home
            - name: workspace
              mountPath: /opt/dagster/workspace
      volumes:
        - name: instance
          configMap: { name: dagster-instance }
        - name: workspace
          configMap: { name: dagster-workspace }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
    spec:
      containers:
        - name: gateway
          image: edp:dev
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef: { name: edp-env }
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: data
spec:
  selector: { app: gateway }
  ports:
    - port: 8000
      targetPort: 8000
